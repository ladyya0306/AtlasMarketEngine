catalog:
  catalog_id: supply_snapshot_catalog_v1
  version: 1
  recommended_snapshot_id: spindle_medium
  release_startup_family: spindle
  description: "固定房产供应盘目录。用于在不改交易主链和 LLM 决策边界的前提下，先把供给结构定量化。"

base_profile_pack:
  path: config/line_a_profile_pack_v2_template.yaml
  experiment_mode: abundant

property_bucket_tiers:
  CORE_STRONG_SCHOOL_STARTER: starter
  CORE_STRONG_SCHOOL_IMPROVE: improve
  CORE_NONSCHOOL_IMPROVE: improve
  CORE_LUXURY_PRESERVATION: luxury
  SUBCORE_GENERAL_SCHOOL_STARTER: starter
  SUBCORE_NONSCHOOL_STARTER: starter
  SUBCORE_IMPROVE_FAMILY: improve
  PERIPHERAL_COST_STARTER: starter
  PERIPHERAL_MULTI_CHILD_LARGE: improve
  SENIOR_FRIENDLY_COMFORT: improve

structure_families:
  spindle:
    description: "梭子型结构：中间改善与主流需求更厚，两端保留但不过度堆积。"
    startup_label: "梭子型固定供应盘"
    startup_config_patches:
      market.zones.A.supply_band_ratio.low: 0.25
      market.zones.A.supply_band_ratio.mid: 0.50
      market.zones.A.supply_band_ratio.high: 0.25
      market.zones.B.supply_band_ratio.low: 0.45
      market.zones.B.supply_band_ratio.mid: 0.40
      market.zones.B.supply_band_ratio.high: 0.15
    tier_scale_map:
      starter: 0.95
      improve: 1.15
      luxury: 0.65
  pyramid:
    description: "金字塔结构：刚需与入门盘更厚，高端盘更薄。"
    startup_label: "金字塔固定供应盘"
    startup_config_patches:
      market.zones.A.supply_band_ratio.low: 0.40
      market.zones.A.supply_band_ratio.mid: 0.40
      market.zones.A.supply_band_ratio.high: 0.20
      market.zones.B.supply_band_ratio.low: 0.55
      market.zones.B.supply_band_ratio.mid: 0.35
      market.zones.B.supply_band_ratio.high: 0.10
    tier_scale_map:
      starter: 1.20
      improve: 0.95
      luxury: 0.45

size_profiles:
  minimum:
    description: "最小样本：用于机制排查、候选链路和回归测试。"
    count_scale: 0.45
    display_name: "最小样本"
    approx_total_supply: 39
    catalog_status: "warn"
    startup_characteristics: "最快，适合机制排查与回归；局部热点更容易拥挤。"
    startup_speed_tradeoff: "速度最快，适合快速看链路是否跑通。"
    startup_accuracy_tradeoff: "统计稳定性最弱，局部竞争形状更容易被随机波动放大。"
  medium:
    description: "适中样本：推荐默认研究盘。"
    count_scale: 1.00
    display_name: "中样本"
    approx_total_supply: 91
    catalog_status: "pass"
    startup_characteristics: "推荐默认基准盘，速度和稳定性最平衡。"
    startup_speed_tradeoff: "运行速度适中，适合大多数 1-3 月验证。"
    startup_accuracy_tradeoff: "结构覆盖稳定，适合做基准比较和 checkpoint 复核。"
  large:
    description: "较大样本：用于更稳定的多月桥接和压力实验。"
    count_scale: 1.80
    display_name: "大样本"
    approx_total_supply: 164
    catalog_status: "pass"
    startup_characteristics: "最稳，适合多月桥接、长测前复查和压力实验。"
    startup_speed_tradeoff: "运行最慢，但更能承受多月波动和冲击。"
    startup_accuracy_tradeoff: "统计稳定性最好，更适合看扩散、承接和跨月链条。"

presets:
  - snapshot_id: spindle_minimum
    structure_family: spindle
    size_profile: minimum
    recommended_use: "最小回归 / 机制排查"
  - snapshot_id: spindle_medium
    structure_family: spindle
    size_profile: medium
    recommended_use: "默认基准盘 / A-B 桥接研究"
  - snapshot_id: spindle_large
    structure_family: spindle
    size_profile: large
    recommended_use: "长测前稳定性复查"
  - snapshot_id: pyramid_minimum
    structure_family: pyramid
    size_profile: minimum
    recommended_use: "最小样本金字塔对照"
  - snapshot_id: pyramid_medium
    structure_family: pyramid
    size_profile: medium
    recommended_use: "供给结构敏感性对照"
  - snapshot_id: pyramid_large
    structure_family: pyramid
    size_profile: large
    recommended_use: "高供给梯度压力测试"
